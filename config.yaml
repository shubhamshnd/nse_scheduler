# ── Fundamental Quality Filter ───────────────────────────────
# Stage 1: runs over all ~250 Nifty500 symbols.
# Passes only financially sound companies into the technical screener.
fundamentals:
  cache_hours: 24             # reuse cached results within this window
  max_workers: 4              # parallel yfinance fetches (keep ≤5 on Pi)
  filters:
    min_market_cap_cr: 500    # minimum market cap in Crores INR
    max_debt_to_equity: 200   # yfinance returns D/E as % (200 = 2.0x ratio)
                              # D/E filter is SKIPPED for Financial/Banking sectors
    min_revenue_growth: -0.15 # allow up to -15% YoY revenue decline
    min_roe: 0.05             # minimum 5% Return on Equity
    require_positive_cashflow: false  # set true for stricter filter

# ── Screening Filters ────────────────────────────────────────
# Stage 2: technical momentum + indicator scoring
screening:
  momentum:
    lookback_days: 252
    exclude_recent_days: 21
  technical:
    adx_min: 20
    rsi_min: 35
    rsi_max: 72
    ema_above_200: true
  scoring_weights:
    momentum_score: 0.40
    rsi_score:      0.20
    adx_score:      0.20
    volume_score:   0.20

# ── News Fetch ───────────────────────────────────────────────
# Stage 3: only for the top shortlist (saves NewsData credits)
news:
  max_credits_per_run: 25     # shortlist_size ≤ this keeps you well within budget
  articles_per_symbol: 5
  language: "en"
  sentiment_confidence_threshold: 0.55

# ── Groq AI Agent ────────────────────────────────────────────
groq:
  model: "llama-3.3-70b-versatile"
  max_tokens: 2048
  temperature: 0.2

# ── Schedule (24h format, Asia/Kolkata timezone) ─────────────
schedule:
  enabled: true
  timezone: "Asia/Kolkata"
  jobs:
    - name: "morning_scan"
      time: "07:45"           # early start — fundamentals takes ~5 min
      tasks: ["fundamentals", "screen", "news", "ai_analysis", "telegram_report"]
    - name: "earnings_check"
      time: "09:15"
      tasks: ["earnings_dashboard", "telegram_report"]
    - name: "evening_review"
      time: "15:45"           # before market close
      tasks: ["screen", "news", "ai_analysis", "telegram_report"]
      # note: fundamentals omitted here — uses cached data from morning run

# ── Telegram Report ──────────────────────────────────────────
telegram:
  enabled: false              # set true once bot token + chat_id are filled in
  send_on_scan_complete: true
  send_earnings_alerts: true
  max_stocks_in_message: 10

# ── Web Dashboard ────────────────────────────────────────────
web:
  host: "0.0.0.0"
  port: 5000
  debug: false
  secret_key: "change_this_to_a_random_string"

# ── Logging ──────────────────────────────────────────────────
logging:
  level: "INFO"
  file: "logs/pipeline.log"
  max_bytes: 5242880
  backup_count: 3
