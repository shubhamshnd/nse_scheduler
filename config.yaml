# ============================================================
#  NIFTY PIPELINE — MASTER CONFIGURATION
#  Edit this file to configure all pipeline behaviour.
#  No code changes needed for normal operation.
# ============================================================

# ── API Keys ────────────────────────────────────────────────
api_keys:
  alpha_vantage: "YOUR_ALPHA_VANTAGE_KEY"
  newsdata_io:   "YOUR_NEWSDATA_IO_KEY"
  groq:          "YOUR_GROQ_API_KEY"
  telegram_bot:  "YOUR_TELEGRAM_BOT_TOKEN"
  telegram_chat: "YOUR_TELEGRAM_CHAT_ID"   # can be a personal chat or group id

# ── Data Source Toggle ───────────────────────────────────────
# "yfinance"       → free, no key needed, good for testing
# "alpha_vantage"  → production, needs key above
data_source: "yfinance"

# ── Universe ─────────────────────────────────────────────────
universe:
  # How many top stocks (by score) to carry forward into news + AI analysis
  shortlist_size: 20
  # Minimum market cap in Crores INR (0 = no filter when using yfinance)
  min_market_cap_cr: 500
  # Nifty500 symbols — add/remove as needed (BSE suffix used for Alpha Vantage)
  # For yfinance, use NSE suffix: RELIANCE.NS, TCS.NS etc.
  # A starter list of 50 liquid Nifty500 names is pre-loaded below.
  symbols_yfinance:
    - "RELIANCE.NS"
