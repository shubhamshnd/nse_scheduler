# ============================================================
#  NIFTY PIPELINE — MASTER CONFIGURATION
# ============================================================

# ── API Keys ────────────────────────────────────────────────
api_keys:
  alpha_vantage: ""
  newsdata_io: ""
  groq: ""
  telegram_bot: ""
  telegram_chat: ""
  # Keys are loaded from .env — see .env.example

# ── Data Source Toggle ───────────────────────────────────────
data_source: "yfinance"

