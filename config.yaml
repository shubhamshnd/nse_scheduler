# ============================================================
#  NIFTY PIPELINE — MASTER CONFIGURATION
#  Edit this file to configure all pipeline behaviour.
#  No code changes needed for normal operation.
# ============================================================

# ── API Keys ────────────────────────────────────────────────
api_keys:
  alpha_vantage: "YOUR_ALPHA_VANTAGE_KEY"
  newsdata_io:   "YOUR_NEWSDATA_IO_KEY"
  groq:          "YOUR_GROQ_API_KEY"
  telegram_bot:  "YOUR_TELEGRAM_BOT_TOKEN"
  telegram_chat: "YOUR_TELEGRAM_CHAT_ID"

# ── Data Source Toggle ───────────────────────────────────────
# "yfinance"       → free, no key needed (default / testing)
# "alpha_vantage"  → production, needs key above
data_source: "yfinance"

# ── Universe ─────────────────────────────────────────────────
# Set use_preset_nifty500: true to use the full ~250-symbol list
# in core/nifty500_symbols.py instead of the manual list below.
use_preset_nifty500: true

universe:
  shortlist_size: 20          # top N stocks carried into news + AI
  min_market_cap_cr: 500      # fallback filter (also in fundamentals section)

  # Manual symbol lists — only used when use_preset_nifty500: false
  symbols_yfinance:
