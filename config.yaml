# ── Fundamental Quality Filter ───────────────────────────────
fundamentals:
  cache_hours: 24
  max_workers: 4
  filters:
    min_market_cap_cr: 500
    max_debt_to_equity: 200
    min_revenue_growth: -0.15
    min_roe: 0.05
    require_positive_cashflow: false

# ── Screening Filters ────────────────────────────────────────
screening:
  momentum:
    lookback_days: 252
    exclude_recent_days: 21
  technical:
    adx_min: 20
    rsi_min: 35
    rsi_max: 72
    ema_above_200: true
    require_golden_cross: false   # true = only stocks where EMA50 > EMA200
  scoring_weights:
    momentum_score: 0.40          # now uses Sharpe-adjusted momentum
    rsi_score: 0.20
    adx_score: 0.20
    volume_score: 0.20
  sector_cap: 3                   # max stocks per sector in final shortlist
  regime_filter:
    enabled: true                 # shrink shortlist in BEAR markets
    bear_shortlist_size: 5        # shortlist size when Nifty50 < EMA200

# ── EMA Crossover Alerts ─────────────────────────────────────
crossover:
  enabled: true
  alert_days_ahead: 15            # alert when crossover predicted within N days

# ── News Fetch ───────────────────────────────────────────────
news:
  max_credits_per_run: 30
  articles_per_symbol: 5
  language: "en"
  sentiment_confidence_threshold: 0.55

# ── Groq AI Agent ────────────────────────────────────────────
groq:
  model: "llama-3.3-70b-versatile"
  max_tokens: 2048
  temperature: 0.2

# ── Schedule ─────────────────────────────────────────────────
schedule:
  enabled: true
  timezone: "Asia/Kolkata"
  jobs:
    - name: "morning_scan"
      time: "05:30"
      tasks: ["fundamentals", "screen", "news", "ai_analysis", "telegram_report"]
    - name: "earnings_check"
      time: "09:15"
      tasks: ["earnings_dashboard", "telegram_report"]
    - name: "midday_crossover"
      time: "11:00"
      tasks: ["crossover_alerts"]   # intraday crossover check (market hours)
    - name: "afternoon_crossover"
      time: "14:30"
      tasks: ["crossover_alerts"]   # second check before close
    - name: "evening_review"
      time: "16:30"
      tasks: ["screen", "news", "ai_analysis", "telegram_report"]

# ── Telegram Report ──────────────────────────────────────────
telegram:
  enabled: false
  send_on_scan_complete: true
  send_earnings_alerts: true
  max_stocks_in_message: 10

# ── Web Dashboard ────────────────────────────────────────────
web:
  host: "0.0.0.0"
  port: 5001
  debug: false
  secret_key: "change_this_to_a_random_string"

# ── Logging ──────────────────────────────────────────────────
logging:
  level: "INFO"
  file: "logs/pipeline.log"
  max_bytes: 5242880
  backup_count: 3
