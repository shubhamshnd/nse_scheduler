<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Nifty Pipeline{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root { --sidebar-w: 210px; }
    body { background: #0d1117; color: #e6edf3; }
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: #010409;
      border-right: 1px solid #21262d;
      flex-shrink: 0;
    }
    .sidebar .brand { font-size: 1.1rem; font-weight: 700; color: #f0f6fc; }
    .sidebar .nav-link { color: #8b949e; border-radius: 6px; padding: .45rem .85rem; font-size: .9rem; }
    .sidebar .nav-link:hover { color: #f0f6fc; background: #21262d; }
    .sidebar .nav-link.active { color: #58a6ff; background: #1f2937; }
    .sidebar .nav-link i { width: 18px; }
    .badge-BUY   { background: #1a7f37 !important; color: #fff !important; }
    .badge-HOLD  { background: #9a6700 !important; color: #fff !important; }
    .badge-AVOID { background: #b91c1c !important; color: #fff !important; }
    .badge-BULLISH { background: #1a7f37 !important; color:#fff !important; }
    .badge-BEARISH { background: #b91c1c !important; color:#fff !important; }
    .badge-NEUTRAL, .badge-MIXED { background: #484f58 !important; color:#fff !important; }
    .score-track { height: 5px; background: #21262d; border-radius: 3px; min-width: 60px; }
    .score-fill  { height: 100%; border-radius: 3px; background: linear-gradient(90deg,#1f6feb,#58a6ff); }
    .pulse { animation: pulse 1.8s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .main-content { max-width: calc(100vw - var(--sidebar-w)); overflow-x: auto; }
    pre.log-line { font-size:.78rem; margin:0; padding:0; white-space:pre-wrap; word-break:break-all; }
    .log-ERROR   { color: #f87171; }
    .log-WARNING { color: #fbbf24; }
    .log-INFO    { color: #d1d5db; }
    .log-DEBUG   { color: #6b7280; }
    .card { background: #161b22; border-color: #21262d; }
    .table { --bs-table-bg: transparent; --bs-table-striped-bg: #161b22; }
    th { color: #8b949e !important; font-weight: 500; font-size: .82rem; text-transform: uppercase; letter-spacing:.04em; }
  </style>
</head>
<body>
<div class="d-flex">
  <!-- ── Sidebar ─────────────────────────────────────────────── -->
  <nav class="sidebar d-flex flex-column p-3 gap-1">
    <div class="brand mb-3">📈 Nifty Pipeline</div>
    <div id="run-badge" class="mb-2 d-none">
      <span class="badge bg-warning text-dark pulse">
        <i class="bi bi-arrow-repeat me-1"></i>Running…
      </span>
    </div>
    <ul class="nav flex-column gap-1 flex-fill">
      <li><a class="nav-link {% if active=='index' %}active{% endif %}" href="/">
          <i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
      <li><a class="nav-link {% if active=='earnings' %}active{% endif %}" href="/earnings">
          <i class="bi bi-calendar3 me-2"></i>Earnings</a></li>
      <li><a class="nav-link {% if active=='config' %}active{% endif %}" href="/config">
          <i class="bi bi-gear me-2"></i>Config</a></li>
      <li><a class="nav-link {% if active=='logs' %}active{% endif %}" href="/logs">
          <i class="bi bi-terminal me-2"></i>Logs</a></li>
    </ul>
    <div class="mt-3 pt-3 border-top border-secondary small text-secondary">
      <div id="ist-clock" class="mb-1"></div>
      <div class="text-muted" style="font-size:.72rem;">Nifty500 Pipeline v1.0</div>
    </div>
  </nav>

  <!-- ── Main ───────────────────────────────────────────────── -->
  <main class="flex-fill p-4 main-content">
    {% block content %}{% endblock %}
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // IST clock
  (function tick() {
    const el = document.getElementById('ist-clock');
    if (el) el.textContent = new Date().toLocaleString('en-IN',
      {timeZone:'Asia/Kolkata', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
    setTimeout(tick, 1000);
  })();

  // Poll run status every 3 s; reload when a run finishes
  let _wasRunning = {{ 'true' if is_running is defined and is_running else 'false' }};
  async function pollStatus() {
    try {
      const d = await fetch('/api/status').then(r => r.json());
      const badge = document.getElementById('run-badge');
      if (d.is_running) {
        if (badge) badge.classList.remove('d-none');
        _wasRunning = true;
      } else {
        if (badge) badge.classList.add('d-none');
        if (_wasRunning) { _wasRunning = false; location.reload(); }
      }
    } catch(_) {}
  }
  setInterval(pollStatus, 8000);
</script>
{% block scripts %}{% endblock %}
</body>
</html>
